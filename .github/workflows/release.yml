name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "z2a ${{ steps.version.outputs.VERSION }}"
          body: |
            ## z2a ${{ steps.version.outputs.VERSION }}

            Zapret2 for Android — DPI-обход с автоциркулярной ротацией стратегий.

            ### Установка
            1. Скачайте APK
            2. Разрешите установку из неизвестных источников
            3. Установите и запустите
            4. Нажмите кнопку подключения
            5. Разрешите VPN-подключение

            ### Что нового
            - См. коммиты от предыдущего релиза
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
